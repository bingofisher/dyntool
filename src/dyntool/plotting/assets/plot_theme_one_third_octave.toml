[locale]
font_family = "sans-serif"
sans_serif = ["SongTNR", "Microsoft YaHei", "SimHei"]
math_fontset = "stix"
unicode_minus = false

[figure]
width_cm = 15.0
height_cm = 8.5
dpi = 150
add_axes_rect = [0.10, 0.16, 0.84, 0.74]

[axes.spines]
top = false
bottom = true
left = true
right = false
linewidth = 0.9

[axes.ticks]
direction = "in"

[axes.ticks.major]
length = 3.2
width = 0.8

[axes.ticks.minor]
length = 2.2
width = 0.6

[grid.x.major]
enabled = false

[grid.x.minor]
enabled = false

[grid.y.major]
enabled = false

[grid.y.minor]
enabled = false

[artist.plot]
linewidth = 1.4
linestyle = "-"
markersize = 5.0
color = "#1f77b4"
marker = "o"
alpha = 0.95

[artist.scatter]
s = 18
color = "#1f77b4"
marker = "o"
alpha = 0.95

[artist.axhline]
linestyle = "--"
linewidth = 1.0
color = "darkorange"
alpha = 1.0

[artist.fill_between]
color = "#1f77b4"
alpha = 0.15
linewidth = 0.0
linestyle = "-"

[legend]
loc = "upper right"
fontsize = 9
frameon = false
ncol = 1
