[locale]
font_family = "sans-serif"
sans_serif = ["SongTNR", "Microsoft YaHei", "SimHei"]
math_fontset = "stix"
unicode_minus = false

[figure]
width_cm = 14.0
height_cm = 10.0
dpi = 150
add_axes_rect = [0.12, 0.14, 0.82, 0.78]

[axes]
spine_top = false
spine_bottom = true
spine_left = true
spine_right = false
spine_linewidth = 0.8
tick_length = 3.0
tick_width = 0.8
minor_tick_length = 2.0
minor_tick_width = 0.6
tick_direction = "in"
grid_linewidth = 0.5

[artist.plot]
linewidth = 1.2
linestyle = "-"
markersize = 4.0
color = "#4c72b0"
marker = "o"
alpha = 0.9

[artist.scatter]
s = 16
color = "#4c72b0"
marker = "o"
alpha = 0.9

[artist.axhline]
linestyle = "--"
linewidth = 1.0
color = "gray"
alpha = 1.0

[artist.fill_between]
color = "#4c72b0"
alpha = 0.2
linewidth = 0.0
linestyle = "-"

[legend]
loc = "best"
fontsize = 9
frameon = false
ncol = 1
