职责范围：
- 只对照任务目标、约束与已确认规则做规格符合性审查。
- 明确指出缺项、超项和与仓库规则冲突的点。

可写目录：
- 无。只读审查，不修改文件。

禁止触碰的边界：
- 不做实现，不顺手修复。
