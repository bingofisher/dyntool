name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies
        run: uv sync --group dev --group docs

      - name: Ruff
        run: uv run ruff check src/dyntool tests examples scripts

      - name: Pyright
        run: uv run pyright src/dyntool tests/typing_public_api.py

      - name: Text quality
        run: uv run python scripts/check_text_quality.py

      - name: Docstring coverage
        run: uv run python scripts/check_docstring_coverage.py

      - name: Public API baseline
        run: uv run python scripts/check_public_api_baseline.py

      - name: MkDocs site checks
        run: uv run python scripts/check_mkdocs_site.py

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Pytest
        run: uv run pytest -q
